name: zzc工作流

on:
  push:
    branches: [main]
  workflow_dispatch:

# 1. 设置 GITHUB_TOKEN 的权限，这是官方部署方式必须的
permissions:
  contents: read
  pages: write
  id-token: write

# 2. 并发控制：如果正在构建中又推送了新代码，取消旧的构建
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # 任务 1: 构建项目
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20  # 升级 Node 版本适配 Vite 7
          cache: npm       # 启用缓存

      - name: Install dependencies
        run: npm ci        # 使用 ci 进行清洁安装，速度更快

      - name: Build
        run: npm run build

      # 3. 上传构建产物 (Artifacts)
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist     # 指向 Vite 的打包目录

  # 任务 2: 部署到 GitHub Pages
  deploy:
    runs-on: ubuntu-latest
    needs: build           # 依赖 build 任务成功完成后才执行
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
